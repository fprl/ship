<svg width="680" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg"><title>Ship architecture now vs after</title><desc>Top: today one feature edits seven shared files across the client and helper binaries. Bottom: the agreed shape — independent modules over an apps and activation-records layer, adapters, a mechanism-only kernel, and OS primitives.</desc>
<defs><marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M1,1 L7,4 L1,7" fill="none" stroke="#888780" stroke-width="1.4"/></marker>
<style>
  .th { font: 500 14px sans-serif; fill: #2C2C2A; }
  .ts { font: 400 12px sans-serif; fill: #444441; }
  .coral rect { fill: #FAECE7; stroke: #993C1D; }
  .coral text { fill: #712B13; }
  .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .teal text { fill: #085041; }
  .purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .purple text { fill: #3C3489; }
  .gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray text { fill: #444441; }
</style></defs>

<text x="40" y="58" class="th">Now — every feature edits the same shared files</text>
<text x="40" y="80" class="ts">coral = files a single new feature must edit today</text>

