<g class="coral"><rect x="54" y="132" width="222" height="34" rx="4"/><text x="165" y="154" text-anchor="middle" class="ts">verb builders</text></g>
<g class="coral"><rect x="54" y="174" width="222" height="34" rx="4"/><text x="165" y="196" text-anchor="middle" class="ts">human / JSON rendering</text></g>
<g class="gray"><rect x="54" y="216" width="222" height="34" rx="4"/><text x="165" y="238" text-anchor="middle" class="ts">ssh runner</text></g>

<g class="coral"><rect x="298" y="160" width="84" height="48" rx="4"/><text x="340" y="180" text-anchor="middle" class="ts">protocol</text><text x="340" y="196" text-anchor="middle" class="ts">catalogue</text></g>
<text x="340" y="228" text-anchor="middle" class="ts">ssh</text>

<g class="gray"><rect x="390" y="96" width="250" height="212" rx="4" fill-opacity="0.35"/><text x="515" y="118" text-anchor="middle" class="ts">box · cmd/helper</text></g>
<g class="coral"><rect x="404" y="132" width="222" height="34" rx="4"/><text x="515" y="154" text-anchor="middle" class="ts">command tree</text></g>
<g class="coral"><rect x="404" y="174" width="222" height="34" rx="4"/><text x="515" y="196" text-anchor="middle" class="ts">auth role matrix</text></g>
<g class="coral"><rect x="404" y="216" width="222" height="34" rx="4"/><text x="515" y="238" text-anchor="middle" class="ts">error catalogue + agent docs</text></g>
<g class="gray"><rect x="404" y="258" width="222" height="34" rx="4"/><text x="515" y="280" text-anchor="middle" class="ts">deploy engine</text></g>

<g class="coral"><rect x="40" y="330" width="600" height="34" rx="4"/><text x="340" y="352" text-anchor="middle" class="ts">4,000-line smoke test — shared by every feature</text></g>
<text x="40" y="392" class="ts">adding cron today: seven coordinated edits across both binaries — agents serialize</text>

<line x1="40" y1="412" x2="640" y2="412" stroke="#888780" stroke-width="1" stroke-dasharray="4 4"/>

<text x="40" y="444" class="th">After — a kernel of mechanism, modules of meaning</text>

<g class="teal"><rect x="40" y="462" width="112" height="36" rx="4"/><text x="96" y="485" text-anchor="middle" class="ts">data</text></g>
<g class="teal"><rect x="161" y="462" width="112" height="36" rx="4"/><text x="217" y="485" text-anchor="middle" class="ts">litestream</text></g>
<g class="teal"><rect x="282" y="462" width="112" height="36" rx="4" stroke-width="2.5"/><text x="338" y="485" text-anchor="middle" class="ts">cron · new</text></g>
<g class="teal"><rect x="403" y="462" width="112" height="36" rx="4"/><text x="459" y="485" text-anchor="middle" class="ts">hardening</text></g>
<g class="teal"><rect x="524" y="462" width="112" height="36" rx="4"/><text x="580" y="485" text-anchor="middle" class="ts">metrics</text></g>
<text x="40" y="522" class="ts">each module = one directory + one composition file · zero shared edits</text>

