<svg width="100%" viewBox="0 0 680 552" role="img" xmlns="http://www.w3.org/2000/svg"><title>Deploy lifecycle: today versus the activation model</title><desc>Two side-by-side flows. Today's deploy snapshots five things, mutates in place, and unwinds everything on failure. The activation model prepares a candidate beside the serving release, commits one atomic file, then converges the runtime; failure before the commit leaves debris for GC, failure after rolls forward.</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><style>text{font-family:ui-sans-serif,system-ui,sans-serif}.th{font-size:14px;font-weight:500}.t{font-size:14px}.ts{font-size:12px}.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}.gray .th{fill:#444441}.gray .ts{fill:#5F5E5A}.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}.teal .th{fill:#085041}.teal .ts{fill:#0F6E56}.coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}.coral .th{fill:#712B13}.coral .ts{fill:#993C1D}.lane{fill:none;stroke:#B4B2A9;stroke-dasharray:4 4;stroke-width:0.5}.arr{stroke:#5F5E5A;stroke-width:1.5}.lbl{fill:#5F5E5A}.hdr{fill:#2C2C2A}</style></defs><g class="gray"><rect x="40" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="58" y="40" dominant-baseline="central">step</text><g class="teal"><rect x="110" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="128" y="40" dominant-baseline="central">the one commit point</text><g class="coral"><rect x="290" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="308" y="40" dominant-baseline="central">failure path</text><rect class="lane" x="40" y="64" width="290" height="464" rx="4"/><text class="th hdr" x="55" y="86">Today — choreography + unwind</text><rect class="lane" x="350" y="64" width="290" height="464" rx="4"/><text class="th hdr" x="365" y="86">After — crash-only lifecycle</text><g class="gray"><rect x="65" y="104" width="240" height="48" rx="4"/><text class="th" x="185" y="122" text-anchor="middle" dominant-baseline="central">Snapshot everything</text><text class="ts" x="185" y="139" text-anchor="middle" dominant-baseline="central">five restore points</text></g><g class="gray"><rect x="65" y="178" width="240" height="48" rx="4"/><text class="th" x="185" y="196" text-anchor="middle" dominant-baseline="central">Build + start release</text><text class="ts" x="185" y="213" text-anchor="middle" dominant-baseline="central">release cmd, stop old workers</text></g><g class="gray"><rect x="65" y="252" width="240" height="48" rx="4"/><text class="th" x="185" y="270" text-anchor="middle" dominant-baseline="central">Swap caddy + reload</text><text class="ts" x="185" y="287" text-anchor="middle" dominant-baseline="central">traffic switches here</text></g><g class="gray"><rect x="65" y="326" width="240" height="48" rx="4"/><text class="th" x="185" y="344" text-anchor="middle" dominant-baseline="central">Persist + clean up</text><text class="ts" x="185" y="361" text-anchor="middle" dominant-baseline="central">manifest, prune, remove old</text></g><g class="gray"><rect x="65" y="400" width="240" height="48" rx="4"/><text class="th" x="185" y="418" text-anchor="middle" dominant-baseline="central">Append journal</text><text class="ts" x="185" y="435" text-anchor="middle" dominant-baseline="central">recorded after cleanup</text></g><line class="arr" x1="185" y1="154" x2="185" y2="174" marker-end="url(#arrow)"/><line class="arr" x1="185" y1="228" x2="185" y2="248" marker-end="url(#arrow)"/><line class="arr" x1="185" y1="302" x2="185" y2="322" marker-end="url(#arrow)"/><line class="arr" x1="185" y1="376" x2="185" y2="396" marker-end="url(#arrow)"/><g class="coral"><rect x="65" y="472" width="240" height="44" rx="4"/><text class="th" x="185" y="488" text-anchor="middle" dominant-baseline="central">On any failure: unwind</text><text class="ts" x="185" y="504" text-anchor="middle" dominant-baseline="central">restore five, restart workers</text></g><g class="gray"><rect x="375" y="104" width="240" height="48" rx="4"/><text class="th" x="495" y="122" text-anchor="middle" dominant-baseline="central">Prepare candidate</text><text class="ts" x="495" y="139" text-anchor="middle" dominant-baseline="central">beside the serving release</text></g><g class="gray"><rect x="375" y="178" width="240" height="48" rx="4"/><text class="th" x="495" y="196" text-anchor="middle" dominant-baseline="central">Validate</text><text class="ts" x="495" y="213" text-anchor="middle" dominant-baseline="central">probe + staged caddy check</text></g><g class="teal"><rect x="375" y="252" width="240" height="48" rx="4"/><text class="th" x="495" y="270" text-anchor="middle" dominant-baseline="central">Commit active.json</text><text class="ts" x="495" y="287" text-anchor="middle" dominant-baseline="central">one atomic rename</text></g><g class="gray"><rect x="375" y="326" width="240" height="48" rx="4"/><text class="th" x="495" y="344" text-anchor="middle" dominant-baseline="central">Converge runtime</text><text class="ts" x="495" y="361" text-anchor="middle" dominant-baseline="central">fragment, reload, workers</text></g><g class="gray"><rect x="375" y="400" width="240" height="48" rx="4"/><text class="th" x="495" y="418" text-anchor="middle" dominant-baseline="central">Journal + lazy GC</text><text class="ts" x="495" y="435" text-anchor="middle" dominant-baseline="central">debris cleaned later</text></g><line class="arr" x1="495" y1="154" x2="495" y2="174" marker-end="url(#arrow)"/><line class="arr" x1="495" y1="228" x2="495" y2="248" marker-end="url(#arrow)"/><line class="arr" x1="495" y1="302" x2="495" y2="322" marker-end="url(#arrow)"/><line class="arr" x1="495" y1="376" x2="495" y2="396" marker-end="url(#arrow)"/><g class="coral"><rect x="375" y="472" width="240" height="44" rx="4"/><text class="th" x="495" y="488" text-anchor="middle" dominant-baseline="central">Fail early — GC later</text><text class="ts" x="495" y="504" text-anchor="middle" dominant-baseline="central">fail late — rerun rolls forward</text></g></svg>
