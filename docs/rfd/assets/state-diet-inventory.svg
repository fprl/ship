<svg width="100%" viewBox="0 0 680 690" role="img" xmlns="http://www.w3.org/2000/svg"><title>Ship state inventory: today versus after the diet and activation model</title><desc>Two panels. Left lists today's fourteen durable state shapes colored by fate: deleted, reshaped, or kept. Right shows the end state: three intent files under /etc/ship, operational state under /var/lib/ship, ephemeral approvals under /run, a tiny active.json per env, manifests inside the image, and rendered artifacts derived from truth.</desc><defs><style>text{font-family:ui-sans-serif,system-ui,sans-serif}.th{font-size:14px;font-weight:500}.t{font-size:14px}.ts{font-size:12px}.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5}.gray .t{fill:#444441}.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5}.teal .t{fill:#085041}.coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:0.5}.coral .t{fill:#712B13}.lane{fill:none;stroke:#B4B2A9;stroke-dasharray:4 4;stroke-width:0.5}.lbl{fill:#5F5E5A}.hdr{fill:#2C2C2A}</style></defs><g class="gray"><rect x="40" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="58" y="40" dominant-baseline="central">kept as-is</text><g class="teal"><rect x="140" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="158" y="40" dominant-baseline="central">new or reshaped</text><g class="coral"><rect x="290" y="34" width="12" height="12" rx="2"/></g><text class="ts lbl" x="308" y="40" dominant-baseline="central">deleted</text><rect class="lane" x="40" y="64" width="300" height="602" rx="4"/><text class="th hdr" x="55" y="86">Today — 14 durable shapes</text><rect class="lane" x="360" y="64" width="280" height="602" rx="4"/><text class="th hdr" x="375" y="86">After — fewer, smaller, scoped</text><text class="ts lbl" x="60" y="108">under /etc/ship</text><g class="coral"><rect x="60" y="120" width="260" height="26" rx="4"/><text class="t" x="72" y="133" dominant-baseline="central">host.json</text></g><g class="teal"><rect x="60" y="154" width="260" height="26" rx="4"/><text class="t" x="72" y="167" dominant-baseline="central">doctor.json</text></g><g class="teal"><rect x="60" y="188" width="260" height="26" rx="4"/><text class="t" x="72" y="201" dominant-baseline="central">approvals.json</text></g><g class="gray"><rect x="60" y="222" width="260" height="26" rx="4"/><text class="t" x="72" y="235" dominant-baseline="central">members.json</text></g><g class="gray"><rect x="60" y="256" width="260" height="26" rx="4"/><text class="t" x="72" y="269" dominant-baseline="central">box-config.json</text></g><g class="gray"><rect x="60" y="290" width="260" height="26" rx="4"/><text class="t" x="72" y="303" dominant-baseline="central">secrets/</text></g><g class="teal"><rect x="60" y="324" width="260" height="26" rx="4"/><text class="t" x="72" y="337" dominant-baseline="central">journals (3 jsonl files)</text></g><text class="ts lbl" x="60" y="372">per env (/var/apps/…)</text><g class="teal"><rect x="60" y="386" width="260" height="26" rx="4"/><text class="t" x="72" y="399" dominant-baseline="central">ship.json</text></g><g class="coral"><rect x="60" y="420" width="260" height="26" rx="4"/><text class="t" x="72" y="433" dominant-baseline="central">applied ship.toml</text></g><g class="coral"><rect x="60" y="454" width="260" height="26" rx="4"/><text class="t" x="72" y="467" dominant-baseline="central">releases/&lt;release&gt;/ files</text></g><g class="coral"><rect x="60" y="488" width="260" height="26" rx="4"/><text class="t" x="72" y="501" dominant-baseline="central">runtime/.env singleton</text></g><g class="coral"><rect x="60" y="522" width="260" height="26" rx="4"/><text class="t" x="72" y="535" dominant-baseline="central">static/current symlink</text></g><g class="gray"><rect x="60" y="556" width="260" height="26" rx="4"/><text class="t" x="72" y="569" dominant-baseline="central">caddy fragment (derived)</text></g><g class="gray"><rect x="60" y="590" width="260" height="26" rx="4"/><text class="t" x="72" y="603" dominant-baseline="central">authorized_keys (derived)</text></g><text class="ts lbl" x="375" y="108">/etc/ship — intent</text><g class="gray"><rect x="375" y="120" width="250" height="26" rx="4"/><text class="t" x="387" y="133" dominant-baseline="central">members.json</text></g><g class="gray"><rect x="375" y="154" width="250" height="26" rx="4"/><text class="t" x="387" y="167" dominant-baseline="central">box-config.json</text></g><g class="gray"><rect x="375" y="188" width="250" height="26" rx="4"/><text class="t" x="387" y="201" dominant-baseline="central">secrets/</text></g><text class="ts lbl" x="375" y="236">/var/lib/ship — operational</text><g class="teal"><rect x="375" y="248" width="250" height="26" rx="4"/><text class="t" x="387" y="261" dominant-baseline="central">doctor checkpoint</text></g><g class="teal"><rect x="375" y="282" width="250" height="26" rx="4"/><text class="t" x="387" y="295" dominant-baseline="central">journals — torn-tail safe</text></g><text class="ts lbl" x="375" y="330">/run/ship — dies on reboot</text><g class="teal"><rect x="375" y="342" width="250" height="26" rx="4"/><text class="t" x="387" y="355" dominant-baseline="central">pending approvals</text></g><text class="ts lbl" x="375" y="390">per env</text><g class="teal"><rect x="375" y="402" width="250" height="26" rx="4"/><text class="t" x="387" y="415" dominant-baseline="central">ship.json — shrunk</text></g><g class="teal"><rect x="375" y="436" width="250" height="26" rx="4"/><text class="t" x="387" y="449" dominant-baseline="central">active.json — commit point</text></g><g class="teal"><rect x="375" y="470" width="250" height="26" rx="4"/><text class="t" x="387" y="483" dominant-baseline="central">activations/&lt;id&gt;.env</text></g><text class="ts lbl" x="375" y="518">inside the image</text><g class="teal"><rect x="375" y="530" width="250" height="26" rx="4"/><text class="t" x="387" y="543" dominant-baseline="central">release envelope label</text></g><text class="ts lbl" x="375" y="578">rendered from truth</text><g class="gray"><rect x="375" y="590" width="250" height="26" rx="4"/><text class="t" x="387" y="603" dominant-baseline="central">caddy fragment</text></g><g class="gray"><rect x="375" y="624" width="250" height="26" rx="4"/><text class="t" x="387" y="637" dominant-baseline="central">authorized_keys</text></g></svg>
